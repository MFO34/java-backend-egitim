spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                    # en yüksek güvence — tüm ISR ack ister
      retries: 3
      properties:
        enable.idempotence: true   # exactly-once semantics (producer side)
        max.in.flight.requests.per.connection: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: order-service-group
      auto-offset-reset: earliest  # yeni grup → en baştan oku
      enable-auto-commit: false    # manuel commit — at-least-once
      properties:
        spring.json.trusted.packages: "com.kafka.model"
    listener:
      ack-mode: MANUAL_IMMEDIATE   # listener içinden ack
      concurrency: 3               # 3 consumer thread (partition sayısına eşit olmalı)

app:
  topics:
    orders: orders-topic
    payments: payments-topic
    notifications: notifications-topic
    dlq: orders-topic.DLQ
