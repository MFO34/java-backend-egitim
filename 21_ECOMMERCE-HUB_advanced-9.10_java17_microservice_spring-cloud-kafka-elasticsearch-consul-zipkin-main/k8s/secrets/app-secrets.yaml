apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: ecommerce
  labels:
    app.kubernetes.io/part-of: ecommerce-hub
# Opaque: genel amaçlı key-value secret tipi
# Production'da bu dosyayı git'e COMMIT ETME!
# Vault, AWS Secrets Manager veya Sealed Secrets kullan.
type: Opaque
data:
  # =====================================================================
  # Tüm değerler Base64 encode edilmiş olmalıdır.
  # Encode etmek için: echo -n "değer" | base64
  # Decode etmek için: echo "base64değer" | base64 --decode
  # =====================================================================

  # --- Veritabanı Şifresi ---
  # "postgres" → base64 → "cG9zdGdyZXM="
  DB_USERNAME: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=

  # --- JWT Secret Key (256-bit hex) ---
  # Orijinal: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  JWT_SECRET: NDA0RTYzNTI2NjU1NkE1ODZFMzI3MjM1NzUzODc4MkY0MTNGNDQyODQ3MkI0QjYyNTA2NDUzNjc1NjZCNTk3MA==

  # --- Grafana Admin Şifresi ---
  # "admin123" → base64
  GRAFANA_PASSWORD: YWRtaW4xMjM=
