---
# =====================================================================
# Redis - Cache + Rate Limiting
# Deployment kullanıyoruz (StatefulSet değil) çünkü Redis'i
# ephemeral cache olarak kullanıyoruz — veri kaybı kabul edilebilir.
# Production'da Redis Sentinel veya Redis Cluster düşünülmeli.
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ecommerce
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # maxmemory-policy allkeys-lru: bellek dolunca LRU ile temizle
          command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"  # maxmemory 256mb + overhead
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: ecommerce
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
