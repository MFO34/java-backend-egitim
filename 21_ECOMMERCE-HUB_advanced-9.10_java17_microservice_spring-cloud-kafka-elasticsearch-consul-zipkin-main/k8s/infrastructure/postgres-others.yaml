---
# =====================================================================
# PostgreSQL - Product Service Veritabanı
# =====================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-product
  namespace: ecommerce
  labels:
    app: postgres-product
spec:
  serviceName: "postgres-product-svc"
  replicas: 1
  selector:
    matchLabels:
      app: postgres-product
  template:
    metadata:
      labels:
        app: postgres-product
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "product_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "product_db"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "product_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-product-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-product-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi  # Ürün veritabanı daha büyük olabilir
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-product-svc
  namespace: ecommerce
spec:
  selector:
    app: postgres-product
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
