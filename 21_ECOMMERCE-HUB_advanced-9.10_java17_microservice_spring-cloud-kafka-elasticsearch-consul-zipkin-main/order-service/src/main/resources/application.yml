# =====================================================================
# Order Service - Uygulama Yapılandırması
# =====================================================================

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- KAFKA ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

server:
  port: ${SERVER_PORT:8083}

# ---- RESILIENCE4J ----
resilience4j:
  circuitbreaker:
    instances:
      orderService:
        failure-rate-threshold: 50           # %50 hata → devre açık
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s     # 30 saniye OPEN kaldıktan sonra HALF-OPEN
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
  retry:
    instances:
      orderService:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - org.apache.kafka.common.KafkaException
  timelimiter:
    instances:
      orderService:
        timeout-duration: 5s

spring.cloud.consul:
  host: ${CONSUL_HOST:localhost}
  port: ${CONSUL_PORT:8500}
  discovery:
    enabled: true
    register: true
    instance-id: ${spring.application.name}-${server.port}
    health-check-path: /actuator/health
    health-check-interval: 15s
    prefer-ip-address: true

# OpenFeign — Consul'dan servis URL'i çözümler
spring.cloud.openfeign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
        loggerLevel: basic

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

spring.zipkin:
  base-url: ${ZIPKIN_URL:http://localhost:9411}
  enabled: true

logging:
  level:
    com.ecommerce.order: DEBUG
    io.github.resilience4j: DEBUG
    root: INFO
