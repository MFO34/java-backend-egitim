spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:digitalbank}?currentSchema=account_schema
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: account_schema

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: account_schema
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000

  # Spring Cache Redis backend olarak kullanır
  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckRpZ2l0YWxCYW5rUGxhdGZvcm0yMDI0}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.digitalbank: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
