# ==================== DOCKER COMPOSE YAPILANDIRMASI ====================
# Redis Cache Demo - Tam Stack
# Çalıştırma: docker-compose up --build
# Durdurma:   docker-compose down
# Temizleme:  docker-compose down -v (volume'leri de sil)

# Docker Compose sürümü
version: '3.9'

# ==================== SERVİSLER ====================
services:

  # ── 1. SPRING BOOT UYGULAMASI ───────────────────────────────────────────
  app:
    # Dockerfile'dan imaj oluştur (multi-stage build)
    build:
      context: .           # Dockerfile'ın bulunduğu dizin
      dockerfile: Dockerfile
    # Konteyner adı
    container_name: redis-demo-app
    # Uygulama portu - host:konteyner
    ports:
      - "${SERVER_PORT:-8080}:8080"
    # Çevre değişkenleri - .env dosyasından veya varsayılan değerler
    environment:
      # PostgreSQL bağlantı bilgileri
      - DB_HOST=db                         # Docker servis adı (hostname)
      - DB_PORT=5432                        # PostgreSQL portu
      - DB_NAME=${DB_NAME:-redisdb}         # Veritabanı adı
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres123}
      # Redis bağlantı bilgileri
      - REDIS_HOST=redis                   # Docker servis adı
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}  # Boş = şifresiz
      # JWT ayarları
      - JWT_SECRET=${JWT_SECRET:-buCokGizliAnahtar1234567890123456789012345678}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-900}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-604800}
      # Spring aktif profil
      - SPRING_PROFILES_ACTIVE=docker
    # Bu servisler hazır olmadan başlama
    depends_on:
      db:
        condition: service_healthy   # PostgreSQL hazır olana kadar bekle
      redis:
        condition: service_healthy   # Redis hazır olana kadar bekle
    # Otomatik yeniden başlatma - kilitlenirse veya crash olursa
    restart: unless-stopped
    # Ağ bağlantısı
    networks:
      - redis-demo-network
    # Sağlık kontrolü
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s    # 30 saniyede bir kontrol
      timeout: 10s     # 10 saniye bekleme süresi
      retries: 5       # 5 başarısız denemeden sonra unhealthy
      start_period: 60s # İlk 60 saniye kontrol yapma (başlangıç zamanı)

  # ── 2. POSTGRESQL VERİTABANI ─────────────────────────────────────────────
  db:
    # PostgreSQL 16 resmi imajı
    image: postgres:16-alpine
    container_name: redis-demo-postgres
    # PostgreSQL portu
    ports:
      - "5432:5432"
    # Veritabanı ortam değişkenleri
    environment:
      - POSTGRES_DB=${DB_NAME:-redisdb}          # Oluşturulacak veritabanı
      - POSTGRES_USER=${DB_USERNAME:-postgres}    # Süper kullanıcı
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres123} # Şifre
      # Performans optimizasyonu
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8    # UTF-8 encoding
    # Veritabanı verilerini kalıcı olarak sakla
    volumes:
      - pgdata:/var/lib/postgresql/data   # Veri volume'u
      # İlk çalıştırmada SQL betiği çalıştır (opsiyonel)
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    # PostgreSQL'in hazır olup olmadığını kontrol et
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-redisdb}"]
      interval: 10s   # 10 saniyede bir kontrol
      timeout: 5s     # 5 saniye bekleme
      retries: 5      # 5 denemede başarısız olursa unhealthy
    restart: unless-stopped
    networks:
      - redis-demo-network

  # ── 3. REDIS 7 ────────────────────────────────────────────────────────────
  redis:
    # Redis 7 resmi imajı (Alpine = küçük boyut)
    image: redis:7-alpine
    container_name: redis-demo-redis
    # Redis portu
    ports:
      - "6379:6379"
    # Redis başlatma komutu - özel yapılandırma
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    # Not: REDIS_PASSWORD boşsa şifre ekleme
    # Şifreli kullanım için:
    # command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # Redis verilerini kalıcı sakla (AOF - Append Only File)
    volumes:
      - redis-data:/data    # Redis veri dizini
    # Redis'in çalışıp çalışmadığını kontrol et
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]    # PING → PONG beklenir
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - redis-demo-network

  # ── 4. REDIS COMMANDER (REDIS UI) ────────────────────────────────────────
  redis-commander:
    # Redis Commander - Redis web arayüzü
    image: rediscommander/redis-commander:latest
    container_name: redis-demo-commander
    # Web arayüz portu - http://localhost:8081
    ports:
      - "8081:8081"
    # Redis bağlantı bilgileri
    environment:
      - REDIS_HOSTS=local:redis:6379    # "local" adıyla redis:6379'a bağlan
      # Şifreli kullanım için:
      # - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    # Redis hazır olana kadar başlama
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redis-demo-network

  # ── 5. PGADMIN (POSTGRESQL UI) ────────────────────────────────────────────
  pgadmin:
    # pgAdmin 4 - PostgreSQL web yönetim arayüzü
    image: dpage/pgadmin4:latest
    container_name: redis-demo-pgadmin
    # pgAdmin web arayüz portu - http://localhost:5050
    ports:
      - "5050:80"
    # pgAdmin giriş bilgileri
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
      # Otomatik sunucu yapılandırma dosyası
      - PGADMIN_CONFIG_SERVER_MODE=False    # Tek kullanıcı modu
    # pgAdmin verilerini kalıcı sakla
    volumes:
      - pgadmin-data:/var/lib/pgadmin   # pgAdmin yapılandırma ve oturum verileri
    # PostgreSQL hazır olana kadar başlama
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - redis-demo-network

# ==================== VOLUME'LER ====================
volumes:
  # PostgreSQL veri volume'u - container silinse bile veri kalır
  pgdata:
    driver: local
    name: redis-demo-pgdata

  # Redis AOF ve RDB veri volume'u
  redis-data:
    driver: local
    name: redis-demo-redis-data

  # pgAdmin yapılandırma volume'u
  pgadmin-data:
    driver: local
    name: redis-demo-pgadmin-data

# ==================== AĞLAR ====================
networks:
  # Tüm servisler bu ağ üzerinden haberleşir
  redis-demo-network:
    driver: bridge       # Standart bridge ağı
    name: redis-demo-net
