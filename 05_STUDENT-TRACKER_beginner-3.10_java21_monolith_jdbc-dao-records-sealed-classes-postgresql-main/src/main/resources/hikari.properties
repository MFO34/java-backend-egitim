# ============================================================
# hikari.properties — HikariCP Connection Pool Ayarları
#
# HikariCP: Java dünyasının en hızlı connection pool kütüphanesi
# Connection Pool = Hazır bağlantılar havuzu
#
# Her SQL sorgusunda yeni bağlantı açmak pahalıdır (~50ms)
# HikariCP bağlantıları önceden açar, havuzda tutar (~1ms)
# ============================================================

# ---- TEMEL BAĞLANTI BİLGİLERİ ----

# JDBC URL formatı: jdbc:postgresql://HOST:PORT/VERITABANI_ADI
# localhost: Docker container Mac'in 5432 portuna yönlendirildi
dataSourceClassName=org.postgresql.ds.PGSimpleDataSource
dataSource.serverName=localhost
dataSource.portNumber=5432
dataSource.databaseName=ogrenci_takip
dataSource.user=ogrenci_user
dataSource.password=ogrenci_pass

# ---- POOL BOYUTU AYARLARI ----

# Minimum idle (bekleyen) bağlantı sayısı
# Pool her zaman en az bu kadar bağlantıyı açık tutar
minimumIdle=2

# Maximum toplam bağlantı sayısı
# Aynı anda en fazla bu kadar bağlantı açılır
maximumPoolSize=10

# ---- ZAMAN AŞIMI AYARLARI ----

# Bağlantı bekleme süresi: pool doluysa kaç ms bekle?
# 30000ms = 30 saniye bekle, sonra hata fırlat
connectionTimeout=30000

# Idle bağlantı ömrü: kullanılmayan bağlantı kaç ms sonra kapatılsın?
# 600000ms = 10 dakika boşta kalan bağlantı kapat
idleTimeout=600000

# Maksimum bağlantı ömrü: en fazla kaç ms yaşasın?
# 1800000ms = 30 dakika, sonra yeni bağlantıyla değiştir
maxLifetime=1800000

# ---- BAĞLANTI TESTİ ----

# Pool'dan alınan bağlantı hâlâ geçerli mi diye sorgulanacak SQL
# PostgreSQL için standart bağlantı testi sorgusu
connectionTestQuery=SELECT 1

# ---- POOL ADI (Loglarda görünür) ----
poolName=OgrenciTakipPool
