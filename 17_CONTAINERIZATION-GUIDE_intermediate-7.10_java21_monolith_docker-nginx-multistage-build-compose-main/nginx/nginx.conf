# ==============================================================================
# Nginx Yapılandırması - Reverse Proxy + Load Balancer
# ==============================================================================
#
# Bu yapılandırma şunları sağlar:
#   1. Reverse Proxy: İstemci → Nginx → Spring Boot App
#   2. Load Balancing: İstekleri app1 ve app2 arasında dağıt
#   3. Rate Limiting: DDoS koruması
#   4. Güvenlik başlıkları: XSS, Clickjacking koruması
#   5. Gzip sıkıştırma: Bant genişliği tasarrufu
#   6. SSL Termination: HTTPS işleme (yapılandırma hazır, sertifika şart)
# ==============================================================================

# ── WORKER SÜREÇLER ──────────────────────────────────────────────────────────
# worker_processes: Nginx worker süreç sayısı
# auto: CPU çekirdek sayısına göre otomatik ayarla (önerilir)
# Örn: 4 çekirdekli sunucuda 4 worker başlatır
worker_processes auto;

# Hata log dosyası ve log seviyesi
# warn: sadece uyarı ve üstü loglar
error_log /var/log/nginx/error.log warn;

# Process ID dosyası - nginx -s reload için gerekli
pid /var/run/nginx.pid;

# ── EVENTS BLOĞU ─────────────────────────────────────────────────────────────
events {
    # Her worker sürecinin aynı anda yönetebileceği bağlantı sayısı
    # Toplam max bağlantı = worker_processes × worker_connections
    # Örn: 4 worker × 1024 = 4096 eşzamanlı bağlantı
    worker_connections 1024;

    # epoll: Linux'ta çok sayıda bağlantı için en verimli event modeli
    use epoll;

    # Birden fazla bağlantıyı aynı anda kabul et (performans artışı)
    multi_accept on;
}

# ── HTTP BLOĞU ────────────────────────────────────────────────────────────────
http {

    # ── TEMEL HTTP AYARLARI ───────────────────────────────────────────────────

    # MIME tipi dosyasını dahil et (hangi uzantı hangi Content-Type?)
    include /etc/nginx/mime.types;
    # Bilinmeyen dosya tipleri için varsayılan MIME tipi
    default_type application/octet-stream;

    # ── LOG FORMAT ────────────────────────────────────────────────────────────
    # Özel log formatı tanımla - analiz için yararlı alanlar
    # $upstream_addr: hangi backend instance karşıladı? (load balancing izleme)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr '     # Hangi app instance karşıladı?
                    'rt=$request_time '            # İstek süresi (saniye)
                    'uct=$upstream_connect_time '  # Upstream bağlantı süresi
                    'urt=$upstream_response_time'; # Upstream yanıt süresi

    # Erişim log dosyası - yukarıda tanımlanan "main" formatını kullan
    access_log /var/log/nginx/access.log main;

    # ── PERFORMANS OPTİMİZASYONU ─────────────────────────────────────────────

    # sendfile: Dosya gönderimini kernel seviyesinde yap (kullanıcı alanına kopyalamadan)
    # Statik dosya sunumu için kritik performans artışı
    sendfile on;

    # tcp_nopush: Paketleri biriktirip toplu gönder (sendfile açıkken etkili)
    # HTTP yanıt başlığı ve gövdeyi aynı pakette gönderir
    tcp_nopush on;

    # tcp_nodelay: Küçük paketleri hemen gönder (gerçek zamanlı yanıt için)
    # tcp_nopush ile birlikte kullanıldığında denge sağlar
    tcp_nodelay on;

    # ── BAĞLANTI ZAMAN AŞIMLARI ───────────────────────────────────────────────

    # keepalive_timeout: Kalıcı bağlantının açık kalma süresi (saniye)
    # 65: her HTTP isteği için yeni TCP bağlantısı kurulmaz → hızlı
    keepalive_timeout 65;

    # İstemciden başlık okuma zaman aşımı
    client_header_timeout 12;

    # İstemciden gövde okuma zaman aşımı
    client_body_timeout 12;

    # İstemciye yanıt gönderme zaman aşımı (yavaş istemciler bağlantıyı meşgul etmesin)
    send_timeout 10;

    # ── GÜVENLİK: SUNUCU BİLGİSİNİ GİZLE ────────────────────────────────────
    # server_tokens: Nginx sürüm bilgisini gizle
    # Varsayılan: "nginx/1.25.3" → server_tokens off → "nginx"
    # Sürüm bilgisi saldırganların exploit aramasına yardımcı olur
    server_tokens off;

    # ── DOSYA YÜKLEME LİMİTİ ─────────────────────────────────────────────────
    # client_max_body_size: İstemcinin gönderebileceği maksimum gövde boyutu
    # Büyük dosya yüklemelerini engeller (DoS koruması)
    client_max_body_size 10M;

    # ── GZIP SIKIŞTIIRMA ──────────────────────────────────────────────────────
    # Yanıtları sıkıştır → daha az bant genişliği, daha hızlı aktarım
    # JSON, HTML, CSS gibi metin tabanlı içerikler %60-80 küçülür

    # Gzip sıkıştırmayı etkinleştir
    gzip on;

    # Sıkıştırma seviyesi: 1 (hızlı/az sıkışır) - 9 (yavaş/çok sıkışır)
    # 6: hız ve sıkıştırma oranı dengesi
    gzip_comp_level 6;

    # Minimum sıkıştırma boyutu - küçük dosyaları sıkıştırma (overhead artar)
    gzip_min_length 1000;

    # HTTP/1.1 proxy isteklerini de sıkıştır
    gzip_proxied any;

    # Hangi içerik tiplerini sıkıştır
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        text/xml;

    # ── RATE LIMITING ─────────────────────────────────────────────────────────
    # limit_req_zone: İstek hızı sınırlama bölgesi tanımla
    # DDoS ve brute-force saldırılarına karşı koruma
    #
    # $binary_remote_addr: IP bazlı sınırlama (binary format = daha az bellek)
    # zone=api_limit:10m: "api_limit" adında, 10MB bellek kullanan bölge
    #   10MB ≈ 160.000 benzersiz IP adresi tutabilir
    # rate=10r/s: IP başına saniyede maksimum 10 istek
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Giriş endpoint'i için daha sıkı limit (brute-force koruması)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/m;

    # ── UPSTREAM: LOAD BALANCING TANIMI ──────────────────────────────────────
    # upstream: Yük dengeleyicide kullanılacak backend sunucu grubunu tanımlar
    # Docker Compose'daki "app1" ve "app2" servis adları burada kullanılır
    # Docker iç DNS, servis adını container IP'sine çevirir
    upstream spring_app {

        # ── LOAD BALANCING ALGORİTMASI ────────────────────────────────────────
        # Yorum/yorum kaldırarak farklı algoritmalar test edilebilir:

        # 1. Round Robin (varsayılan - satır eklemeye gerek yok):
        #    İstekleri sırayla dağıtır: app1 → app2 → app1 → app2...
        #    Avantaj: Basit, eşit dağılım
        #    Dezavantaj: Yavaş istekler birikirken yeni istekler hala gelir

        # 2. Least Connections (en az bağlantılı):
        #    İsteği en az aktif bağlantıya sahip sunucuya gönderir
        #    Avantaj: Yük dengesizliğini azaltır
        # least_conn;

        # 3. IP Hash (istemci IP'sine göre sticky session):
        #    Aynı IP her zaman aynı sunucuya gider
        #    Avantaj: Session bazlı uygulamalar için uygun
        #    Dezavantaj: Dengesiz dağılım olabilir
        # ip_hash;

        # ── BACKEND SUNUCULAR ─────────────────────────────────────────────────
        # server: Upstream sunucuyu tanımla
        # Docker Compose servis adı + port
        # app1 ve app2 container'ları aynı ağda - DNS ile çözülür

        # İlk backend: app1 container'ı (port 8080'de dinliyor)
        # weight=1: Her istek için eşit ağırlık (varsayılan)
        # max_fails=3: 3 başarısız istekten sonra geçici olarak devre dışı
        # fail_timeout=30s: 30 saniye devre dışı kal, sonra tekrar dene
        server app1:8080 weight=1 max_fails=3 fail_timeout=30s;

        # İkinci backend: app2 container'ı
        server app2:8080 weight=1 max_fails=3 fail_timeout=30s;

        # ── KEEPALIVE ─────────────────────────────────────────────────────────
        # keepalive: Nginx ile backend arasındaki kalıcı bağlantı sayısı
        # Her istek için yeni TCP bağlantısı kurmak yerine bağlantıları yeniden kullan
        # Spring Boot varsayılan thread pool boyutuna göre ayarla
        keepalive 32;
    }

    # ── HTTP SUNUCU (80 PORTU) ─────────────────────────────────────────────────
    server {
        # HTTP port 80'i dinle
        listen 80;

        # Bu server bloğunun geçerli olduğu domain
        # _ : tüm hostname'ler için eşleş (localhost dahil)
        server_name _;

        # ── HTTPS'E YÖNLENDİRME (SSL AKTİFKEN) ──────────────────────────────
        # Üretimde HTTP isteklerini HTTPS'e yönlendir
        # Aşağıdaki satırı yorumdan çıkarın ve location / bloğunu kaldırın:
        # return 301 https://$server_name$request_uri;

        # ── REVERSE PROXY AYARLARI ────────────────────────────────────────────
        # Tüm istekler için ortak proxy ayarları
        # Bu değerler Spring Boot uygulamasına iletilir

        # Gerçek istemci IP'sini backend'e ilet (X-Forwarded-For başlığı)
        proxy_set_header X-Real-IP $remote_addr;
        # Proxy zinciri boyunca IP'leri ilet
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Protokolü ilet (http veya https)
        proxy_set_header X-Forwarded-Proto $scheme;
        # Orijinal Host başlığını ilet
        proxy_set_header Host $http_host;

        # Proxy bağlantı zaman aşımları
        proxy_connect_timeout 5s;   # Backend'e bağlanma zaman aşımı
        proxy_send_timeout 60s;     # Backend'e veri gönderme zaman aşımı
        proxy_read_timeout 60s;     # Backend'den yanıt bekleme zaman aşımı

        # HTTP/1.1 ile keepalive desteği (upstream keepalive için gerekli)
        proxy_http_version 1.1;
        # Connection başlığını temizle (keepalive için)
        proxy_set_header Connection "";

        # ── GÜVENLİK BAŞLIKLARI ───────────────────────────────────────────────
        # XSS (Cross-Site Scripting) koruması
        add_header X-XSS-Protection "1; mode=block" always;
        # MIME type sniffing koruması
        add_header X-Content-Type-Options "nosniff" always;
        # Clickjacking koruması - sayfanın iframe'de açılmasını engelle
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Content Security Policy - sadece güvenilir kaynaklardan içerik yükle
        add_header Content-Security-Policy "default-src 'self'" always;
        # HSTS - HTTPS kullanan siteler için (SSL aktifken açın)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── ANA UYGULAMA ROUTE ────────────────────────────────────────────────
        # / ile başlayan tüm istekleri upstream grubuna ilet
        location / {
            # Rate limiting uygula: API zone'u, burst=20 (anlık 20 ekstra istek tolere et)
            # nodelay: burst isteklerini geciktirme, anında işle
            limit_req zone=api_limit burst=20 nodelay;

            # İsteği upstream (load balancer) grubuna ilet
            proxy_pass http://spring_app;

            # Proxy buffer ayarları
            proxy_buffering on;
            # Tek buffer boyutu (yanıt başlığı için)
            proxy_buffer_size 4k;
            # Toplam buffer sayısı ve boyutu
            proxy_buffers 8 16k;
        }

        # ── GİRİŞ ENDPOINT'İ (KATALI RATE LIMIT) ──────────────────────────────
        # /auth/login için daha sıkı rate limiting (brute-force koruması)
        location /auth/login {
            # Login için çok daha az istek: dakikada 3 istek, burst yok
            limit_req zone=login_limit burst=5 nodelay;

            # İsteği upstream'e ilet
            proxy_pass http://spring_app;
        }

        # ── ACTUATOR (SAĞLIK DURUMU) ──────────────────────────────────────────
        # Spring Boot actuator endpoint'leri
        location /actuator {
            # Health endpoint'ini dışarıya aç, diğerlerini kısıtla
            # Üretimde actuator'ı sadece iç ağdan erişilebilir yap:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://spring_app;
        }

        # ── NGINX DURUM SAYFASI ───────────────────────────────────────────────
        # Nginx'in kendi sağlık ve istatistik endpoint'i
        # Sadece yerel ağdan erişilebilir
        location /nginx-status {
            # stub_status: Temel Nginx istatistikleri (aktif bağlantı, istek sayısı)
            stub_status on;
            # Sadece localhost'tan erişime izin ver
            allow 127.0.0.1;
            # Docker iç ağından da erişime izin ver
            allow 172.16.0.0/12;
            # Diğer tüm erişimleri engelle
            deny all;
        }

        # ── HATA SAYFASI ──────────────────────────────────────────────────────
        # 502: Backend ulaşılamaz (app container'ı çalışmıyor)
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            # Hata sayfası dosyası
            root /usr/share/nginx/html;
        }
    }

    # ── HTTPS SUNUCU (443 PORTU) - SSL TERMİNASYON ────────────────────────────
    # Bu blok SSL sertifikaları hazır olduğunda aktif edilir
    # SSL Termination: HTTPS → Nginx → HTTP → Backend
    # Backend'e düz HTTP iletilir; şifreleme/çözümleme yükü Nginx'te kalır
    #
    # server {
    #     # HTTPS port 443'ü dinle
    #     listen 443 ssl http2;
    #
    #     # Domain adı (sertifikayla eşleşmeli)
    #     server_name yourdomain.com;
    #
    #     # SSL sertifika dosyaları
    #     # Let's Encrypt: /etc/letsencrypt/live/yourdomain.com/
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # Güvenli SSL protokolleri (TLS 1.2 ve 1.3 - SSLv3, TLS 1.0/1.1 kapalı)
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     # Güvenli şifreleme algoritmaları
    #     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    #
    #     # Sunucu şifre tercihini kullan (istemci değil)
    #     ssl_prefer_server_ciphers on;
    #
    #     # SSL session önbelleği - TLS el sıkışmasını hızlandırır
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS başlığı - tarayıcının 1 yıl boyunca sadece HTTPS kullanmasını söyle
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     location / {
    #         proxy_pass http://spring_app;
    #         # ... diğer proxy ayarları
    #     }
    # }
}
