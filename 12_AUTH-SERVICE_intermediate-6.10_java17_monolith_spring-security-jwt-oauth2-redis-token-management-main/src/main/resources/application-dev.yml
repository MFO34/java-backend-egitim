spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop   # Dev'de her başlangıçta tablo sıfırla

logging:
  level:
    com.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
